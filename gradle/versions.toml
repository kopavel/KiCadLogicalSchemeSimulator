[versions]
lombok = '1.18.42'
log4j2 = '2.25.3'
jackson = '3.0.4'
jUnit = '6.0.3'
jmh = '1.37'
#asm = '9.9.1'

[libraries]
bom-junit = { module = 'org.junit:junit-bom', version.ref = 'jUnit' }
junit-jupiter = { module = 'org.junit.jupiter:junit-jupiter' }
junit-launcher = { module = 'org.junit.platform:junit-platform-launcher' }
idea-gui = 'com.jetbrains.intellij.java:java-gui-forms-rt:+'
idea-gui-compiller= 'com.jetbrains.intellij.java:java-compiler-ant-tasks:+'

swing-flatlaf = 'com.formdev:flatlaf:3.7'
lombok = { module = 'org.projectlombok:lombok', version.ref = 'lombok' }
jackson-databind = { module = 'tools.jackson.core:jackson-databind', version.ref = 'jackson' }
jackson-jakarta-annotations = { module = 'tools.jackson.module:jackson-module-jakarta-xmlbind-annotations', version.ref = 'jackson' }
jackson-dataformat-xml = { module = 'tools.jackson.dataformat:jackson-dataformat-xml', version.ref = 'jackson' }
jackson-jaxb-annotations = { module = 'tools.jackson.module:jackson-module-jaxb-annotations', version.ref = 'jackson' }
jakarta-api = 'jakarta.xml.bind:jakarta.xml.bind-api:4.0.5'
#jaxb-api = 'javax.xml.bind:jaxb-api:2.3.1'
picocli = 'info.picocli:picocli:4.7.7'
#log4j2
log4j-slf4j = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-slf4j-impl' }
log4j-old = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-1.2-api' }
log4j-core = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-core' }
log4j-jcl = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-jcl' }
log4j-jul = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-jul' }
log4j-jpl = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-jpl' }
api-log4j = { version.ref = 'log4j2', module = 'org.apache.logging.log4j:log4j-api' }
xz = 'org.tukaani:xz:1.11'
commons-compress = 'org.apache.commons:commons-compress:1.28.0'
jmh = { module = 'org.openjdk.jmh:jmh-core', version.ref = 'jmh' }
jmh-annotations = { module = 'org.openjdk.jmh:jmh-generator-annprocess', version.ref = 'jmh' }
#asm = { version.ref = 'asm', module = 'org.ow2.asm:asm' }
#asm-tree = { version.ref = 'asm', module = 'org.ow2.asm:asm-tree' }
#asm-util = { version.ref = 'asm', module = 'org.ow2.asm:asm-util' }

[bundles]
